# Build the standalone HTML preview from .docx sources and publish it
# to GitHub Pages. Triggered on every push to main and on demand via
# the Actions tab. The deployed site at
# https://aelangovan-pcd.github.io/CHEM-139-OER-Text-2026/ is regenerated
# from scratch each run, so committed HTML_Files/ stays in sync as a
# byproduct rather than a source of truth.

name: Deploy OER preview to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Opt actions/* steps into the Node 24 runtime ahead of GitHub's
# 2026-06-02 default flip, so the deprecation warning stops nagging
# every run. Safe to remove once the actions ship Node-24-native
# major versions.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Pages deployments serialize per environment; cancel in-progress runs
# when a newer push lands so we don't queue up stale deploys.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: pip install "python-docx>=1.1" "mammoth>=1.7" "beautifulsoup4>=4.12" "pyyaml>=6.0"

      - name: Build HTML preview from .docx sources
        run: python .firecrawl/build_html.py

      - name: Build interactive Chapter 1
        run: |
          python .firecrawl/build_interactive.py --validate
          python .firecrawl/build_interactive.py --fuzz 1000
          python .firecrawl/build_interactive.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: HTML_Files

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
