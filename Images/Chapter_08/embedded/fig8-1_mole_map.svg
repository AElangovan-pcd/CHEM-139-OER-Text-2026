<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" width="720" height="480" font-family="Arial, Helvetica, sans-serif" role="img" aria-labelledby="t d">
  <title id="t">Figure 8.1 — The mole map (chemical-amount triangle)</title>
  <desc id="d">A triangular flowchart connecting grams (top-left), number of particles (top-right), and moles (bottom). Mass and moles are connected through molar mass. Particles and moles are connected through Avogadro's number. Mass and particles connect only via moles.</desc>

  <defs>
    <marker id="aend" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1F4F8B"/>
    </marker>
    <marker id="astart" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M10,0 L0,5 L10,10 z" fill="#1F4F8B"/>
    </marker>
  </defs>

  <style>
    .node { fill:#E6F0FA; stroke:#1F4F8B; stroke-width:2; }
    .nodelabel { font-size:18px; font-weight:700; fill:#0E2D52; text-anchor:middle; }
    .edge { stroke:#1F4F8B; stroke-width:2.2; fill:none; marker-start:url(#astart); marker-end:url(#aend); }
    .edgedashed { stroke:#1F4F8B; stroke-width:2; stroke-dasharray:6 5; fill:none; marker-start:url(#astart); marker-end:url(#aend); }
    .edgelabel { font-size:13px; fill:#0E2D52; text-anchor:middle; }
    .edgelabel-sub { font-size:12px; fill:#0E2D52; text-anchor:middle; font-style:italic; }
  </style>

  <!-- Three nodes: top-left Mass, top-right Particles, bottom Moles -->
  <g>
    <rect class="node" x="40" y="60" width="200" height="76" rx="14"/>
    <text class="nodelabel" x="140" y="95">Mass</text>
    <text class="nodelabel" x="140" y="120" font-size="15">(grams, g)</text>
  </g>
  <g>
    <rect class="node" x="480" y="60" width="200" height="76" rx="14"/>
    <text class="nodelabel" x="580" y="95">Number of particles</text>
    <text class="nodelabel" x="580" y="120" font-size="15">(atoms, molecules, ions)</text>
  </g>
  <g>
    <rect class="node" x="260" y="360" width="200" height="76" rx="14"/>
    <text class="nodelabel" x="360" y="395">Moles</text>
    <text class="nodelabel" x="360" y="420" font-size="15">(mol)</text>
  </g>

  <!-- Edge: Mass <-> Moles -->
  <line class="edge" x1="170" y1="140" x2="320" y2="358"/>
  <g transform="translate(170,250) rotate(-55)">
    <text class="edgelabel" x="0" y="-8">&#215; molar mass (g/mol)  &#8593;</text>
    <text class="edgelabel" x="0" y="12">&#247; molar mass  &#8595;</text>
  </g>

  <!-- Edge: Particles <-> Moles -->
  <line class="edge" x1="550" y1="140" x2="400" y2="358"/>
  <g transform="translate(555,250) rotate(55)">
    <text class="edgelabel" x="0" y="-8">&#215; 6.022 &#215; 10&#178;&#179; /mol  &#8593;</text>
    <text class="edgelabel" x="0" y="12">&#247; 6.022 &#215; 10&#178;&#179;  &#8595;</text>
  </g>

  <!-- Edge: Mass <-> Particles (dashed, "go through moles") -->
  <line class="edgedashed" x1="240" y1="98" x2="480" y2="98"/>
  <text class="edgelabel-sub" x="360" y="40">no direct conversion</text>
  <text class="edgelabel-sub" x="360" y="86">go through moles</text>

  <!-- Title strip at top of figure -->
  <text x="360" y="20" font-size="11" fill="#444" text-anchor="middle" font-style="italic">Mole is the central node: every conversion routes through it.</text>
</svg>
