<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" width="760" height="460" font-family="Arial, Helvetica, sans-serif" role="img" aria-labelledby="t d">
  <title id="t">Figure 9.1 — Stoichiometry road map</title>
  <desc id="d">A 2x2 grid showing four stoichiometry pathways. Top row: Moles A and Moles B connected by the mole ratio from the balanced equation. Below Moles A is Mass A, connected by molar mass A. Below Moles B is Mass B, connected by molar mass B. Mass A to Mass B requires routing through both mole nodes.</desc>

  <defs>
    <marker id="aend" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1B1B1B"/>
    </marker>
    <marker id="aend-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1F4F8B"/>
    </marker>
  </defs>

  <style>
    .node { fill:#E6F0FA; stroke:#1F4F8B; stroke-width:2; }
    .node-key { fill:#FFE9B5; stroke:#A56B00; stroke-width:2.4; }
    .label { font-size:17px; font-weight:700; fill:#0E2D52; text-anchor:middle; }
    .sub { font-size:13px; fill:#0E2D52; text-anchor:middle; }
    .edge { stroke:#1B1B1B; stroke-width:2.2; fill:none; marker-end:url(#aend); }
    .edgekey { stroke:#1F4F8B; stroke-width:2.6; fill:none; marker-end:url(#aend-blue); }
    .edgelabel { font-size:13px; fill:#1B1B1B; text-anchor:middle; }
    .edgelabel-blue { font-size:13px; fill:#1F4F8B; text-anchor:middle; font-weight:700; }
    .longpath { stroke:#A56B00; stroke-width:2.2; stroke-dasharray:8 5; fill:none; }
  </style>

  <text x="380" y="30" font-size="14" font-style="italic" fill="#444" text-anchor="middle">Every stoichiometry problem flows through moles.</text>

  <!-- Top row: Moles A (key node) and Moles B (key node) -->
  <g>
    <rect class="node-key" x="80"  y="80" width="200" height="76" rx="12"/>
    <text class="label" x="180" y="115">Moles A</text>
    <text class="sub"   x="180" y="140">(mol)</text>
  </g>
  <g>
    <rect class="node-key" x="480" y="80" width="200" height="76" rx="12"/>
    <text class="label" x="580" y="115">Moles B</text>
    <text class="sub"   x="580" y="140">(mol)</text>
  </g>

  <!-- Mole ratio edge -->
  <line class="edgekey" x1="280" y1="118" x2="480" y2="118"/>
  <text class="edgelabel-blue" x="380" y="105">&#215; mole ratio</text>
  <text class="edgelabel"      x="380" y="148" font-style="italic">(coefficients from balanced equation)</text>

  <!-- Bottom row: Mass A and Mass B -->
  <g>
    <rect class="node" x="80"  y="300" width="200" height="76" rx="12"/>
    <text class="label" x="180" y="335">Mass A</text>
    <text class="sub"   x="180" y="360">(grams, g)</text>
  </g>
  <g>
    <rect class="node" x="480" y="300" width="200" height="76" rx="12"/>
    <text class="label" x="580" y="335">Mass B</text>
    <text class="sub"   x="580" y="360">(grams, g)</text>
  </g>

  <!-- Vertical edges: Mass <-> Moles -->
  <!-- Left vertical: Moles A <-> Mass A (bidirectional) -->
  <line class="edge" x1="180" y1="160" x2="180" y2="296"/>
  <line class="edge" x1="160" y1="296" x2="160" y2="160"/>
  <text class="edgelabel" x="115" y="232" text-anchor="end">&#247; molar mass A &#8593;</text>
  <text class="edgelabel" x="115" y="252" text-anchor="end">&#215; molar mass A &#8595;</text>

  <!-- Right vertical: Moles B <-> Mass B (bidirectional) -->
  <line class="edge" x1="580" y1="160" x2="580" y2="296"/>
  <line class="edge" x1="600" y1="296" x2="600" y2="160"/>
  <text class="edgelabel" x="645" y="232" text-anchor="start">&#247; molar mass B &#8593;</text>
  <text class="edgelabel" x="645" y="252" text-anchor="start">&#215; molar mass B &#8595;</text>

  <!-- Long path indicator at bottom: Mass A -> Mass B -->
  <path class="longpath" d="M 180 388 Q 380 430 580 388"/>
  <text class="edgelabel" x="380" y="425" fill="#A56B00" font-style="italic">mass A &#8594; mass B: full path through moles</text>

  <!-- Step ordering chips -->
  <g font-size="12" fill="#FFFFFF" text-anchor="middle">
    <circle cx="180" cy="240" r="14" fill="#A56B00"/><text x="180" y="244">1</text>
    <circle cx="380" cy="118" r="14" fill="#A56B00"/><text x="380" y="122">2</text>
    <circle cx="580" cy="240" r="14" fill="#A56B00"/><text x="580" y="244">3</text>
  </g>
</svg>
